<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Sayang</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(180deg,#140505,#2b0000,#4a0d0d);
color:white;
overflow-x:hidden;
min-height:100vh;
}

.page{
min-height:100vh;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
padding:30px 20px;
text-align:center;
animation:fade .8s ease;
}

.page.active{
display:flex;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
padding:30px;
border-radius:28px;
max-width:800px;
width:95%;
box-shadow:0 10px 30px rgba(0,0,0,.35);
}

h1{
font-size:52px;
font-family:'Cormorant Garamond',serif;
margin-bottom:10px;
}

.date{
color:#e2cfcf;
margin-bottom:20px;
letter-spacing:3px;
}

.btn{
margin-top:25px;
padding:14px 28px;
border:none;
border-radius:999px;
background:#651111;
color:white;
cursor:pointer;
font-size:16px;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

.envelope{
width:220px;
cursor:pointer;
animation:float 2.5s ease-in-out infinite;
}

.tap{
margin-top:15px;
opacity:.8;
font-size:14px;
letter-spacing:2px;
}

@keyframes float{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-12px);
}
}

.photo{
width:95%;
max-width:750px;
border-radius:22px;
box-shadow:0 0 25px rgba(0,0,0,.4);
}

.kartu{
width:95%;
max-width:700px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,0,0,.35);
}

.duo{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.duo img{
width:320px;
max-width:90%;
border-radius:20px;
}

.final-photo{
width:350px;
max-width:90%;
border-radius:25px;
margin-bottom:20px;
box-shadow:0 0 30px rgba(0,0,0,.35);
}

.final-text{
font-family:'Cormorant Garamond',serif;
font-size:42px;
margin-top:10px;
}

.kucing{
font-size:80px;
cursor:pointer;
margin-top:20px;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
50%{
transform:translateY(-10px);
}
}

.floating{
position:fixed;
bottom:-50px;
font-size:24px;
opacity:.35;
pointer-events:none;
animation:rise linear forwards;
}

@keyframes rise{
from{
transform:translateY(0);
}
to{
transform:translateY(-120vh);
}
}

</style>
</head>
<body>
  <!-- PAGE 1 -->

<div class="page active" id="page1">

<img
class="envelope"
onclick="nextPage(2)"
src="https://cdn-icons-png.flaticon.com/512/2099/2099199.png"
>

<div class="tap">
tap the envelope
</div>

</div>

<!-- PAGE 2 -->

<div class="page" id="page2">

<div class="card">

<h1>Happy Birthday Sayang</h1>

<div class="date">
04 JUNI 2004
</div>

<p>
semoga semua hal baik selalu dateng ke kamu dan semoga kita bisa terus bareng yang lamaa 🫶
<br><br>
makasih yaa udah selalu ada dan jadi rumah paling nyaman buat aku.
</p>

<button class="btn" onclick="nextPage(3)">
Pencet Aku
</button>

</div>

</div>

<!-- PAGE 3 -->

<div class="page" id="page3">

<img src="photo.png" class="photo">

<button class="btn" onclick="nextPage(4)">
Pencet Lagi
</button>

</div>

<!-- PAGE 4 -->

<div class="page" id="page4">

<img src="call-me-if-you-get-lost-y5hypwlhdb.png" class="kartu">

<div class="kucing" onclick="nextPage(5)">
🐱
</div>

<p style="margin-top:10px;">
klik kucingnyaa
</p>

</div>

<!-- PAGE 5 -->

<div class="page" id="page5">

<div class="duo">

<img src="bunga.jpg">

<img src="emuach.jpg">

</div>

<button class="btn" onclick="nextPage(6)">
Terakhir Nih
</button>

</div>

<!-- PAGE 6 -->

<div class="page" id="page6">

<img src="aku.jpg" class="final-photo">

<div class="final-text">
hadiahnya aku aja mau ga seng?
</div>

<button class="btn" onclick="loveExplosion()">
Mau Banget
</button>

</div>
<script>

function nextPage(page){

if(page===2){
document.getElementById("bgMusic").play();
}

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active");
});

document.getElementById("page"+page).classList.add("active");

window.scrollTo({
top:0,
behavior:"smooth"
});

}

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active");
});

document.getElementById("page"+page).classList.add("active");

window.scrollTo({
top:0,
behavior:"smooth"
});

}

function createFloating(){

const icons=["🖤","🤎","✦"];

const item=document.createElement("div");

item.className="floating";

item.innerHTML=icons[Math.floor(Math.random()*icons.length)];

item.style.left=Math.random()*100+"vw";

item.style.animationDuration=(Math.random()*6+8)+"s";

item.style.fontSize=(Math.random()*20+18)+"px";

document.body.appendChild(item);

setTimeout(()=>{
item.remove();
},15000);

}

setInterval(createFloating,800);

function loveExplosion(){

const icons=["🖤","🤎","✦","🐱"];

for(let i=0;i<60;i++){

const item=document.createElement("div");

item.className="floating";

item.innerHTML=icons[Math.floor(Math.random()*icons.length)];

item.style.left=Math.random()*100+"vw";

item.style.fontSize=(Math.random()*35+20)+"px";

item.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(item);

setTimeout(()=>{
item.remove();
},6000);

}

}

</script>
<audio id="bgMusic">
  <source src="Gabriella Fernaldi - Biru.mp3" type="audio/mpeg">
</audio>
</body>
</html>
