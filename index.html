<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Sayang ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(180deg,#180808,#3b0d0d,#5a1010);
overflow:hidden;
color:white;
height:100vh;
}

.page{
position:absolute;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
animation:fade .8s ease;
}

.page.active{
display:flex;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
padding:30px;
border-radius:30px;
max-width:700px;
width:95%;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,.4);
}

h1{
font-family:'Great Vibes',cursive;
font-size:70px;
margin-bottom:10px;
color:#fff;
}

.date{
font-size:22px;
letter-spacing:4px;
margin-bottom:20px;
color:#ffb6b6;
}

p{
line-height:1.8;
font-size:18px;
}

.btn{
margin-top:25px;
padding:14px 30px;
border:none;
border-radius:999px;
background:#8d1d1d;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.08);
}

.envelope{
font-size:140px;
cursor:pointer;
animation:float 2s ease-in-out infinite;
}

@keyframes float{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-15px);
}
}

.photo{
width:90%;
max-width:700px;
border-radius:25px;
box-shadow:0 0 25px rgba(0,0,0,.5);
}

.kartu{
width:90%;
max-width:750px;
border-radius:20px;
}

.duo{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.duo img{
width:320px;
max-width:90%;
border-radius:20px;
}

.kucing{
font-size:90px;
cursor:pointer;
animation:bounce 1.5s infinite;
margin-top:20px;
}

@keyframes bounce{
50%{
transform:translateY(-15px);
}
}

.final-photo{
width:350px;
max-width:90%;
border-radius:25px;
box-shadow:0 0 30px rgba(255,255,255,.2);
margin-bottom:20px;
}

.final-text{
font-family:'Cormorant Garamond',serif;
font-size:44px;
font-weight:600;
letter-spacing:1px;
color:#f3eaea;
}

.floating{
position:absolute;
font-size:34px;
opacity:.4;
pointer-events:none;
}
animation:rise linear infinite;
opacity:.5;
}

@keyframes rise{
from{
transform:translateY(100vh);
opacity:0;
}
to{
transform:translateY(-120px);
opacity:1;
}
}

.love-rain{
position:absolute;
font-size:35px;
animation:drop 4s linear forwards;
pointer-events:none;
}

@keyframes drop{
from{
transform:translateY(-100px);
opacity:1;
}
to{
transform:translateY(100vh);
opacity:0;
}
}
.envelope-real{
position:relative;
width:220px;
height:140px;
cursor:pointer;
animation:float 2.5s ease-in-out infinite;
}

.envelope-real::before{
content:'';
position:absolute;
bottom:0;
width:220px;
height:140px;
background:#4a0d0d;
border-radius:8px;
}

.flap{
position:absolute;
top:0;
left:0;
width:0;
height:0;
border-left:110px solid transparent;
border-right:110px solid transparent;
border-top:80px solid #2b0000;
z-index:3;
}

.letter{
position:absolute;
width:170px;
height:100px;
background:#f7f1f1;
left:25px;
top:20px;
border-radius:5px;
}
</style>
</head>
<body>
  <!-- PAGE 1 -->

<div class="envelope-real" onclick="nextPage(2)">
<div class="flap"></div>
<div class="letter"></div>
</div>

</div>

<!-- PAGE 2 -->

<div class="page" id="page2">

<div class="card">

<h1>Happy Birthday Sayang</h1>

<div class="date">
04 JUNI 2026
</div>

<p>
semoga semua hal baik selalu dateng ke kamu dan semoga kita bisa terus bareng yang lamaa 🫶
<br><br>
makasih yaa udah selalu ada dan jadi rumah paling nyaman buat aku.
</p>

<button class="btn" onclick="nextPage(3)">
Pencet Aku 
</button>

</div>

</div>

<!-- PAGE 3 -->

<div class="page" id="page3">

<img src="photo.png" class="photo">

<button class="btn" onclick="nextPage(4)">
Pencet Lagi ✨
</button>

</div>

<!-- PAGE 4 -->

<div class="page" id="page4">

<img src="kartu.png" class="kartu">

<div class="kucing" onclick="nextPage(5)">
🐱
</div>

<p style="margin-top:10px;">
klik kucingnyaa
</p>

</div>

<!-- PAGE 5 -->

<div class="page" id="page5">

<div class="duo">

<img src="bunga.jpg">

<img src="emuach.jpg">

</div>

<button class="btn" onclick="nextPage(6)">
Terakhir Nih 💌
</button>

</div>

<!-- PAGE 6 -->

<div class="page" id="page6">

<img src="aku.jpg" class="final-photo">

<div class="final-text">
hadiahnya aku aja mau ga seng? ❤️
</div>

<button class="btn" onclick="loveExplosion()">
Mau Banget
</button>

</div>
<script>

function nextPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active");
});

document.getElementById("page"+page).classList.add("active");

}

function createFloating(){

const items=["🖤","❤️","✨","🎈"];

let el=document.createElement("div");

el.className="floating";

el.innerHTML=items[Math.floor(Math.random()*items.length)];

el.style.left=Math.random()*100+"vw";

el.style.animationDuration=(Math.random()*5+6)+"s";

document.body.appendChild(el);

setTimeout(()=>{
el.remove();
},11000);

}

setInterval(createFloating,700);

function loveExplosion(){

const items=["🖤","🤎","✨","🐱","🎉"];

for(let i=0;i<80;i++){

let love=document.createElement("div");

love.className="love-rain";

love.innerHTML=items[Math.floor(Math.random()*items.length)];

love.style.left=Math.random()*100+"vw";

love.style.fontSize=(Math.random()*25+20)+"px";

love.style.animationDuration=(Math.random()*2+2)+"s";

document.body.appendChild(love);

setTimeout(()=>{
love.remove();
},5000);

}

}

</script>

</body>
</html>
